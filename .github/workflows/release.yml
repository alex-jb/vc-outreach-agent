name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for PyPI Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        # Falls back to API token if Trusted Publishing not configured.
        # Set PYPI_API_TOKEN as a repo secret to use the token route.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Comment out the password line once Trusted Publishing is set up
          # at https://pypi.org/manage/account/publishing/
          password: ${{ secrets.PYPI_API_TOKEN }}
